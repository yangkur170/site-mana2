{% extends "base.html" %}
{% block title %}Credit Score{% endblock %}

{% block content %}
<style>
  :root{
    --g1:#0E5F2F;
    --g2:#1E8E3E;
    --silver: rgba(192,192,192,0.904);
    --shadowA: 0 0 10px rgba(10,10,9,0.788);
    --shadowB: 0 14px 10px rgba(0,0,0,0.815);
    --g-bright:#6BFF2A;

    --shadow: var(--shadowA), var(--shadowB);
  }

  .cs-page, .cs-page *{
    font-family: "Ovelion", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif !important;
  }

  /* page layout like wallet */
  .wrap{
    align-items:flex-start;
    justify-content:center;
    padding-top: 92px;
    padding-bottom: 40px;
  }
  @media(max-width:480px){
    .wrap{ padding-top: 78px; }
  }

  /* ✅ card EXACT wallet style */
  .cs-card{
    width:min(520px, 94vw);
    background: rgba(0,0,0,0.788);
    border-radius: 18px;
    padding: 18px;

    border: 2px solid var(--silver);
    box-shadow: var(--shadow);

    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);

    overflow: hidden;
    text-align:left;
    animation: cardSwipe .45s ease both;
  }

  @keyframes cardSwipe{
    from{ opacity:0; transform: translateX(16px) scale(.99); }
    to{ opacity:1; transform: translateX(0) scale(1); }
  }

  .cs-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
    margin-bottom:12px;
  }

  .cs-title{
    font-size:18px;
    font-weight:950;
    color:#fff;
    line-height:1.1;
  }

  /* ✅ pill EXACT wallet */
  .cs-pill{
    padding:6px 12px;
    border-radius:999px;

    background: linear-gradient(90deg, var(--g1), var(--g2));
    border: 2px solid var(--silver);

    color:#fff;
    font-weight:900;
    font-size:12px;
    white-space:nowrap;

    box-shadow: var(--shadow);
  }

  /* ✅ score box inside card (like wallet input area) */
  .cs-scorebox{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;

    padding:12px 14px;
    border-radius:16px;

    border: 1px solid rgba(255,255,255,.20);
    background: rgba(0,0,0,.18);
  }

  .cs-label{
    font-weight:900;
    color:#fff;
    font-size:13px;
  }

  .cs-note{
    font-size:11px;
    opacity:.75;
    color:#eafff1;
    margin-top:2px;
  }

  .cs-score{
    font-size:28px;
    font-weight:950;
    letter-spacing:.02em;
    color:#fff;
  }

  .cs-actions{
    margin-top:12px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  /* ✅ buttons = culture style */
  .btn{
    height:42px;
    padding:0 18px;
    border-radius:999px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;

    font-weight:900;
    font-size:13px;
    letter-spacing:.02em;

    border: 2px solid var(--silver);
    box-shadow: var(--shadow);
  }

  .btn-ghost{
    background: rgba(0,0,0,.18);
    color:#fff;
  }
  .btn-ghost:active{ transform: scale(.98); opacity:.92; }

  .btn-primary{
    background: linear-gradient(90deg, var(--g1), var(--g2));
    color:#fff;
  }
  .btn-primary:active{ transform: scale(.98); }

  /* ✅ danger mode (low score) */
  .cs-danger{
    border-color: rgba(255,90,90,.55) !important;
  }
  .cs-danger .cs-pill{
    background: rgba(239,68,68,.22) !important;
    border-color: rgba(239,68,68,.55) !important;
    box-shadow: var(--shadow) !important;
  }
  .cs-danger .cs-score{
    color:#ffb3b3 !important;
  }
  .cs-danger .btn-primary{
    background: rgba(239,68,68,.22) !important;
    border-color: rgba(239,68,68,.55) !important;
  }
</style>

{% with cs=request.user.credit_score|default:650 %}
<div class="cs-card cs-page {% if cs|add:0 < 570 %}cs-danger{% endif %}">
  <div class="cs-head">
    <div>
      <div class="cs-title">Credit Score</div>
    </div>
    <div class="cs-pill">Score</div>
  </div>

  <div class="cs-scorebox">
    <div>
      <div class="cs-label">Current Score</div>
      <div class="cs-note">Based on account history</div>
    </div>
    <div class="cs-score">{{ cs }}</div>
  </div>

  <div class="cs-actions">
    <a class="btn btn-ghost" href="/profile/">Back</a>
    <a class="btn btn-primary" href="/dashboard/">Dashboard</a>
  </div>
</div>
{% endwith %}
{% endblock %}

{% block scripts %} 
{% endblock %}
