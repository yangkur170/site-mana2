{% extends "base.html" %}
{% load static %}
{% block title %}Contact{% endblock %}

{% block content %}
<style>
:root{
  --g-dark:#0E5F2F;
  --g-mid:#1E8E3E;
  --g-bright:#6BFF2A;
  --silver: rgba(192, 192, 192, 0.904);
  --shadow: 0 0 10px rgba(10,10,9,0.788), 0 14px 10px rgba(0,0,0,0.815);
}

/* Page background (keep same image) */
body{
  margin:0;
  min-height:100vh;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    linear-gradient(rgba(0,0,0,.58), rgba(0,0,0,.78)),
    url("{% static 'img/SL-012322-48100-03.webp' %}") center / cover no-repeat fixed !important;
  color:#fff;
}

.wrap{
  align-items:flex-start !important;
  justify-content:center !important;
  padding-top:72px !important;
}

.page{
  width: min(520px, 94vw);
  margin: 0 auto;
  padding: 14px 14px 92px;
  box-sizing: border-box;
}

/* ===== Card style = dashboard culture ===== */
.cardx{
  position: relative;
  background: rgba(0, 0, 0, 0.788);
  border-radius: 18px;
  padding: 18px;

  border: 2px solid var(--silver);
  box-shadow: var(--shadow);

  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);

  overflow: hidden;
  margin-bottom: 12px;
}

/* titles */
.title{
  font-weight: 950;
  font-size: 18px;
  letter-spacing:.04em;
  margin: 0 0 6px;
}
.sub{
  font-size: 12px;
  opacity: .80;
  margin: 0;
}

/* Telegram inline (keep same layout) */
.telegram-inline{
  text-align:center;
  margin: 6px 0 12px;
}
.tg-title{
  margin: 0 0 10px;
  font-weight: 950;
  font-size: 14px;
  opacity: .9;
  letter-spacing: .03em;
}

/* Telegram button = green theme */
.tg-btn{
  display: inline-flex;
  align-items: center;
  gap: 10px;

  height: 42px;
  padding: 0 18px;

  border-radius: 999px;
  background: linear-gradient(90deg, var(--g-dark), var(--g-mid));
  border: 2px solid var(--silver);

  color: #eafff1;
  font-weight: 900;
  font-size: 13px;
  letter-spacing: .04em;

  text-decoration: none;
  box-shadow: var(--shadow);
}
.tg-btn:active{ transform: scale(.98); }

.tg-icon{
  width: 18px;
  height: 18px;
  object-fit: contain;
}
.tg-text{ line-height: 1; }

/* Form labels */
label{
  display:block;
  font-size: 12px;
  opacity:.92;
  margin: 10px 0 6px;
  font-weight: 900;
}

/* Inputs = dark glass + green focus */
input, textarea{
  width:100%;
  box-sizing:border-box;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.16);
  background: rgba(0,0,0,.22);
  color:#fff;
  padding: 12px 12px;
  outline:none;
}
textarea{
  min-height: 110px;
  resize: none;
}

input:focus, textarea:focus{
  border-color: rgba(107,255,42,.55);
  box-shadow: 0 0 0 3px rgba(107,255,42,.18);
  background: rgba(0,0,0,.28);
}

/* Submit button = green theme */
.btn{
  width:100%;
  margin-top: 12px;
  border: none;
  border-radius: 999px;
  padding: 14px 16px;

  font-weight: 950;
  letter-spacing: .12em;
  text-transform: uppercase;

  color:#fff;
  cursor:pointer;

  background: linear-gradient(90deg, var(--g-dark), var(--g-bright));
  border: 2px solid rgba(133, 255, 164, .85);
  box-shadow: var(--shadow);
}
.btn:active{ transform: scale(.99); }

/* Success alert = green */
.alert-success{
  border: 2px solid rgba(107,255,42,.45);
  background: rgba(107,255,42,.10);
  color: #eafff1;

  padding: 12px 12px;
  border-radius: 16px;
  font-weight: 900;
  margin-bottom: 12px;

  box-shadow: var(--shadow);
}

/* Back button (keep shape but green theme) */
.top-actions{
  margin-top: 12px;
  display: flex;
  justify-content: flex-start;
}
.back-btn{
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;

  height: 42px;
  padding: 0 22px 0 28px;
  border-radius: 12px;

  background: linear-gradient(90deg, var(--g-dark), var(--g-mid));
  color: #ffffff;

  font-weight: 900;
  text-decoration: none;

  border: 2px solid var(--silver);
  box-shadow: var(--shadow);
}
.back-btn:hover{ transform: translateY(-1px); }
.back-btn:active{ transform: translateY(0px); opacity: .92; }

/* Mobile adjustments */
@media (max-width:520px){
  .top-actions{ padding: 10px 12px 0; }
  .back-btn{ height: 40px; padding: 0 18px 0 24px; font-size: 13px; }
}
</style>

<div class="page">
  <div class="telegram-inline">
    <h4 class="tg-title">Telegram Contact</h4>
  
    <a href="https://t.me/ZANDAFinancialServices"
       target="_blank"
       class="tg-btn">
  
      <img src="{% static 'img/icons/telegram.png' %}"
           alt="Telegram"
           class="tg-icon">
  
      <span class="tg-text">Telegram</span>
    </a>
  </div>
  <div class="cardx">
    <div class="title">CONTACT US</div>
    <p class="sub">Send us a message — we will contact you soon.</p>
  </div>
  <!-- TELEGRAM CONTACT CARD -->
  


  {% if sent %}
    <div class="alert-success">
      ✅ Thank you! We will contact you soon.
    </div>
  {% endif %}

  <div class="cardx">
    <form method="POST" action="/contact/">
      {% csrf_token %}

      <label>Full name</label>
      <input type="text" name="full_name" required>

      <label>Phone / WhatsApp</label>
      <input type="tel" name="phone" required>

      <label>Subject (optional)</label>
      <input type="text" name="subject">

      <label>Message</label>
      <textarea name="message" required></textarea>

      <button class="btn" type="submit">Send Message</button>
    </form>
  </div>
  <!-- TOP ACTIONS -->
<div class="top-actions">
  <a class="back-btn" href="javascript:history.back()">
    Back
  </a>
</div>
<div class="top-actions-line"></div>

</div>
{% endblock %}
